name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Run without publishing'
        type: boolean
        default: false

permissions: {}

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: npm
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check version consistency
        if: github.event_name == 'release'
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi
          echo "Version $PKG_VERSION is consistent"

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      # Node 22 ships npm 10.x, but OIDC Trusted Publishing (token-free publish
      # via the GitHub id-token) requires npm >= 11.5.1. Without this, the
      # publish PUT fails with a misleading E404 even though provenance signs.
      - name: Upgrade npm for Trusted Publishing
        run: npm install -g npm@^11

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm run test:run

      - name: Build package
        run: npm run build

      - name: Verify d.ts entry exports types
        run: |
          if [ ! -f dist/index.d.ts ]; then
            echo "::error::dist/index.d.ts is missing — check vite-plugin-dts config (entryRoot must match build entry directory)."
            exit 1
          fi
          if ! grep -q '^export' dist/index.d.ts; then
            echo "::error::dist/index.d.ts contains no exports — type rollup is broken."
            exit 1
          fi
          # Guard against a "successful" build that silently emits an empty
          # stub. vite-plugin-dts@5 + a too-new TypeScript make API Extractor
          # roll types up to just `export { }` (sidekick-ui#122 → v0.7.0 was
          # tagged but never published). A file that contains ONLY an empty
          # export object — and no real declarations — must fail the gate.
          if ! grep -qE '\bdeclare\b|^export[[:space:]]+(declare|type|interface|function|const|class|default)\b' dist/index.d.ts; then
            echo "::error::dist/index.d.ts has no real type declarations (looks like an empty 'export {}' stub) — type rollup is broken. See sidekick-ui#122."
            echo "::group::dist/index.d.ts (first 40 lines)"
            head -n 40 dist/index.d.ts
            echo "::endgroup::"
            exit 1
          fi
          DTS_LINES=$(wc -l < dist/index.d.ts)
          if [ "$DTS_LINES" -lt 20 ]; then
            echo "::error::dist/index.d.ts is only $DTS_LINES lines — implausibly small for the full public API. Suspect a broken type rollup."
            echo "::group::dist/index.d.ts"
            cat dist/index.d.ts
            echo "::endgroup::"
            exit 1
          fi
          echo "::notice::dist/index.d.ts has $DTS_LINES lines of exports"

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Publish package
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry-run }}" = "true" ]; then
            echo "::notice::Dry run — skipping publish"
            npm publish --dry-run --ignore-scripts
          else
            echo "::notice::Publishing @sidekick-labs/ui"
            npm publish --ignore-scripts --provenance
          fi
