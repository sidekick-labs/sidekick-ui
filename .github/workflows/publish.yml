name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Run without publishing'
        type: boolean
        default: false

permissions: {}

jobs:
  publish:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: 'npm'
          registry-url: 'https://npm.pkg.github.com'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm run test:run

      - name: Build package
        run: npm run build

      - name: Verify d.ts rollup is non-empty
        run: |
          DTS_LINES=$(wc -l < dist/index.d.ts)
          if [ "$DTS_LINES" -lt 50 ]; then
            echo "::error::dist/index.d.ts has only $DTS_LINES line(s) — likely a broken type rollup. vite-plugin-dts uses @microsoft/api-extractor, which silently emits 'export {}' when its bundled compiler is older than the project's TypeScript. See PR #71 for context."
            exit 1
          fi
          echo "::notice::dist/index.d.ts has $DTS_LINES lines"

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Check version consistency
        if: github.event_name == 'release'
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi
          echo "Version $PKG_VERSION is consistent"

      - name: Publish package
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry-run }}" = "true" ]; then
            echo "::notice::Dry run — skipping publish"
            npm publish --dry-run --ignore-scripts
          else
            echo "::notice::Publishing @sidekick-labs/ui"
            npm publish --ignore-scripts
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
