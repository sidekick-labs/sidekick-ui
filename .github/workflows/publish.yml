name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Run without publishing'
        type: boolean
        default: false

permissions: {}

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: npm
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm run test:run

      - name: Build package
        run: npm run build

      - name: Verify d.ts entry exports types
        run: |
          if [ ! -f dist/index.d.ts ]; then
            echo "::error::dist/index.d.ts is missing — check vite-plugin-dts config (entryRoot must match build entry directory)."
            exit 1
          fi
          if ! grep -q '^export' dist/index.d.ts; then
            echo "::error::dist/index.d.ts contains no exports — type rollup is broken."
            exit 1
          fi
          DTS_LINES=$(wc -l < dist/index.d.ts)
          echo "::notice::dist/index.d.ts has $DTS_LINES lines of exports"

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Check version consistency
        if: github.event_name == 'release'
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi
          echo "Version $PKG_VERSION is consistent"

      - name: Publish package
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry-run }}" = "true" ]; then
            echo "::notice::Dry run — skipping publish"
            npm publish --dry-run --ignore-scripts
          else
            echo "::notice::Publishing @sidekick-labs/ui"
            npm publish --ignore-scripts --provenance
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
