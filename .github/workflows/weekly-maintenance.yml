name: Weekly Maintenance (PR)

on:
  schedule:
    - cron: '0 0 * * 0' # Every Sunday at midnight
  workflow_dispatch:

permissions: {}

jobs:
  maintenance:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "::error::ANTHROPIC_API_KEY secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.LINEAR_API_KEY }}" ]; then
            echo "::warning::LINEAR_API_KEY secret is not set - Linear integration will be skipped"
          fi

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Weekly maintenance (prefer PR, fallback to Linear issue)
        uses: anthropics/claude-code-action@38ec876110f9fbf8b950c79f534430740c3ac009 # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          env: |
            LINEAR_API_KEY=${{ secrets.LINEAR_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
            RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Perform weekly repository maintenance:
            1. Check for outdated JS dependencies: `npm outdated`
            2. Scan for JS security vulnerabilities: `npm audit`
               NOTE: npm audit returns non-zero when vulnerabilities are found.
               This is expected - capture output and report findings.
            3. Review open PRs older than 90 days: `gh pr list --state open`
            4. Check for TODO/FIXME comments in commits from the last week

            ## Safe changes (create PR):
            - Running `npm audit fix` (non-breaking fixes only)
            - Fixing broken links or typos in README.md

            ## Risky changes (create Linear issue instead):
            - Major version updates for npm packages
            - Security fixes requiring code changes
            - TODO/FIXME items requiring judgment or design decisions
            - Any change you're uncertain about

            Output rules:
            - If you make safe changes, create a new branch, commit, push, and open a PR against DEFAULT_BRANCH.
            - If only risky items are found (or nothing actionable), create ONE Linear issue summarizing findings.
            - You MUST determine Linear team/project/labels yourself each run by querying Linear.
            - Always include RUN_URL in the PR body or Linear issue description.
            - Do NOT create or reference GitHub Issues (this repo does not use them).

          claude_args: |
            --allowed-tools "Read,Glob,Grep,Bash(git status),Bash(git log),Bash(git diff),Bash(git checkout -b),Bash(git add -A),Bash(git commit -m),Bash(git push -u origin HEAD),Bash(npm outdated),Bash(npm audit),Bash(npm audit fix),Bash(npm run lint),Bash(npm run check),Bash(gh pr list),Bash(gh pr create),mcp__linear__list_teams,mcp__linear__list_projects,mcp__linear__list_issue_labels,mcp__linear__create_issue"
