version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 10
    groups:
      dev-dependencies:
        dependency-type: 'development'
        # Keep type-rollup toolchain ungrouped: a TS major bump silently breaks
        # vite-plugin-dts → api-extractor (see CORE-395, sidekick-ui#71).
        exclude-patterns:
          - 'typescript'
          - '@microsoft/api-extractor'
          - 'vite-plugin-dts'
      prod-dependencies:
        dependency-type: 'production'
    labels:
      - 'dependencies'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 10
    groups:
      actions:
        patterns:
          - '*'
    labels:
      - 'dependencies'
