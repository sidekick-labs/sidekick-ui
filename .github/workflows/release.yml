name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'

      - name: Verify tag matches package.json version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          pkg_version=$(node -p "require('./package.json').version")
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "::error::Tag version ($tag_version) does not match package.json version ($pkg_version)"
            exit 1
          fi

      - name: Extract changelog entry
        id: changelog
        run: |
          version="${GITHUB_REF_NAME#v}"
          notes=$(awk -v ver="$version" '
            /^## \[/ {
              if (found) exit
              if (index($0, "## [" ver "]") == 1) found=1
              next
            }
            found { print }
          ' CHANGELOG.md)

          if [ -z "$notes" ]; then
            echo "::error::No CHANGELOG.md entry found for version $version"
            exit 1
          fi

          # Use a random delimiter to prevent injection via changelog content
          delimiter="EOF_$(openssl rand -hex 8)"
          {
            echo "notes<<${delimiter}"
            echo "$notes"
            echo "${delimiter}"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_NOTES: ${{ steps.changelog.outputs.notes }}
        run: |
          printf "%s" "$RELEASE_NOTES" > /tmp/release_notes.txt
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file /tmp/release_notes.txt
