name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.issue.number || github.event.pull_request.number || github.event.comment.id }}
  cancel-in-progress: false

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read
    # TEMPORARY (octo-brain#174 validation): pinned to the plugin-clone branch to test
    # the sidekick-workflows plugin + private-marketplace bot-token clone on ONE lane
    # before rolling the change to @main. REVERT to @main after validation.
    uses: sidekick-labs/.github/.github/workflows/claude-agent.yml@feat/sidekick-workflows-plugin-ci
    secrets: inherit
