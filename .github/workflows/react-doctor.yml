name: React Doctor

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  react-doctor:
    name: React Doctor
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Run React Doctor
        uses: millionco/react-doctor@1d3d514a562bbab42dcefa0badeed2e707ed7ea9 # v0.0.38
        with:
          diff: ${{ github.base_ref }}
          fail-on: error
          offline: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
